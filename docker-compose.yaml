version: "3.9"

services:

  akstock_db_init:
    image: akshare-stock:${IMAGE_VERSION}  # 👈 用同一个 image
    build: .
    container_name: akstock_db_init
    command: python /app/init_db.py
    volumes:
      - ${DATA_VOLUME}:/data
      - ${LOG_VOLUME}:/logs
    restart: "no"

  akstock_stock_fetcher:
    image: akshare-stock:${IMAGE_VERSION}  # 👈 共用
    container_name: akstock_stock_fetcher
    depends_on:
      - akstock_db_init
    volumes:
      - ${DATA_VOLUME}:/data
      - ${LOG_VOLUME}:/logs
    environment:
      - TZ=${TIME_ZONE}
      - CRON_SCHEDULE=${CRON_SCHEDULE}
    restart: unless-stopped
    
  akstock_api_service:
    image: akshare-stock:${IMAGE_VERSION} # 👈 共用
    container_name: akstock_api_service
    depends_on:
      - akstock_db_init
      - akstock_stock_fetcher
    volumes:
      - ${DATA_VOLUME}:/data
      - ${LOG_VOLUME}:/logs
    ports:
      - "8000:8000"
    command: >
      uvicorn api:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  akstock_dashboard:
    image: akshare-stock:${IMAGE_VERSION} # 👈 共用
    container_name: akstock_dashboard
    depends_on:
      - akstock_db_init
      - akstock_stock_fetcher
      - akstock_api_service
    volumes:
      - ${DATA_VOLUME}:/data
      - ${LOG_VOLUME}:/logs
    ports:
      - "8501:8501"
    command: >
      streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0
    restart: unless-stopped

volumes:
  duckdb_data:
  duckdb_logs:   # 👈 必须声明